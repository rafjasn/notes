name: Deploy

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Image tag to deploy (defaults to git SHA)"
        required: false
        type: string
  # Uncomment to auto-deploy on push to main:
  # push:
  #   branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy-infra:
    name: CDK deploy infra
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/cdk
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK synth
        run: npx cdk synth --quiet
        env:
          CDK_REQUIRE_APP_ENV: "true"
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
          OAUTH_CALLBACK_URLS: ${{ vars.OAUTH_CALLBACK_URLS }}
          OAUTH_LOGOUT_URLS: ${{ vars.OAUTH_LOGOUT_URLS }}

      - name: Deploy infra stack
        run: npx cdk deploy NotesInfraStack --require-approval never
        env:
          CDK_REQUIRE_APP_ENV: "true"
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
          OAUTH_CALLBACK_URLS: ${{ vars.OAUTH_CALLBACK_URLS }}
          OAUTH_LOGOUT_URLS: ${{ vars.OAUTH_LOGOUT_URLS }}

  push-images:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: deploy-infra
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: docker/Dockerfile.api
            ecr_repo: notes-api
          - service: fanout-service
            dockerfile: docker/Dockerfile.fanout-service
            ecr_repo: notes-fanout
          - service: frontend
            dockerfile: docker/Dockerfile.frontend
            ecr_repo: notes-frontend
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: meta
        run: |
          TAG="${{ inputs.imageTag || github.sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ matrix.ecr_repo }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.registry }}/${{ matrix.ecr_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-services:
    name: CDK deploy services
    runs-on: ubuntu-latest
    needs: push-images
    defaults:
      run:
        working-directory: infrastructure/cdk
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK synth
        run: npx cdk synth --quiet
        env:
          CDK_REQUIRE_APP_ENV: "true"
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
          OAUTH_CALLBACK_URLS: ${{ vars.OAUTH_CALLBACK_URLS }}
          OAUTH_LOGOUT_URLS: ${{ vars.OAUTH_LOGOUT_URLS }}

      - name: Deploy services stack
        run: |
          TAG="${{ inputs.imageTag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          npx cdk deploy NotesServicesStack \
            --require-approval never \
            --context imageTag="$TAG"
        env:
          CDK_REQUIRE_APP_ENV: "true"
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
          OAUTH_CALLBACK_URLS: ${{ vars.OAUTH_CALLBACK_URLS }}
          OAUTH_LOGOUT_URLS: ${{ vars.OAUTH_LOGOUT_URLS }}
